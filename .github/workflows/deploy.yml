name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          # Change username if your HF account name differs from GitHub
          huggingface_repo_id: vedanshmathur7/ModelArena
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
